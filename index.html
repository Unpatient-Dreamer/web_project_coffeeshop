<!DOCTYPE html>
<html lang="es">
  <head>
    <title>La Cafetería Web</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Espacio online para los amantes del café, donde puedes encontrar información sobre tu bebida favorita, comprar productos gourmet y participar en una comunidad apasionada."
    />
    <meta name="author" content="Arturo De la Cruz" />
    <meta name="copyright" content="José Arturo De la Cruz Cortés" />
    <meta name="keywords" content="coffeshop, web, project" />
    <link rel="index" href="./pages/index.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./vendor/normalize.css" />
    <link rel="favicon" href="./favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Noto+Serif&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Noto+Serif:ital@1&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="page">
      <header class="header">
        <nav class="nav">
          <img
            src="./images/logo_coffeeshop_dark.svg"
            alt="Coffeshop logo dark"
            class="nav__logo"
          />
          <ul class="nav__links">
            <li>
              <a class="nav__link">Recetas</a>
            </li>
            <li>
              <a class="nav__link">Reservar una mesa</a>
            </li>
            <li>
              <a class="nav__link">Menú</a>
            </li>
            <li>
              <a class="nav__link">Contactos</a>
            </li>
          </ul>
          <h1 class="header__title">
            <span class="header__span-accent">Café de especialidad</span> en
            Triple Peaks
          </h1>
          <p class="header__description">
            ¡Te damos la bienvenida a nuestra zona de estudio! Aquí tenemos café
            para darte energía y una vibra acogedora que motivarán tu
            creatividad.
          </p>
          <img src="./images/inside_coffee_shop.png" />
          <div class="header__footer">
            <ul class="header__list">
              <li class="header__list-item"></li>
            </ul>
          </div>
        </nav>
      </header>
      <main class="content">
        <section class="recipes"></section>
        <section class="reservation"></section>
        <section class="menu"></section>
        <section class="about"></section>
      </main>
      <footer class="footer"></footer>
    </div>
  </body>
</html>
